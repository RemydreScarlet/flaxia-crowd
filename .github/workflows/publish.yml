name: Publish @flaxia packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'node'
        type: choice
        options:
          - node
          - sdk
  push:
    tags:
      - 'node-v*'
      - 'sdk-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci

      - name: Build SDK
        run: npm run build --workspace=packages/sdk

      - name: Debug auth config
        run: |
          echo "=== npmrc ==="
          cat .npmrc 2>/dev/null || echo "no .npmrc"
          echo "=== npm config ==="
          npm config list
          echo "=== env ==="
          echo "NODE_AUTH_TOKEN is set: ${{ env.NODE_AUTH_TOKEN != '' }}"

      - name: Publish SDK
        if: startsWith(github.ref, 'refs/tags/sdk-v') || (github.event_name == 'workflow_dispatch' && inputs.package == 'sdk')
        run: npm config delete //registry.npmjs.org/:_authToken && npm publish --workspace=packages/sdk --provenance

      - name: Build node
        if: startsWith(github.ref, 'refs/tags/node-v') || (github.event_name == 'workflow_dispatch' && inputs.package == 'node')
        run: npm run build --workspace=packages/node

      - name: Publish node
        if: startsWith(github.ref, 'refs/tags/node-v') || (github.event_name == 'workflow_dispatch' && inputs.package == 'node')
        run: npm config delete //registry.npmjs.org/:_authToken && npm publish --workspace=packages/node --provenance
