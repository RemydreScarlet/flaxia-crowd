name: Publish @flaxia packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'node'
        type: choice
        options:
          - node
          - sdk
  push:
    tags:
      - 'node-v*'
      - 'sdk-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci
      - run: npm install -g npm@latest

      - name: Build SDK
        run: npm run build --workspace=packages/sdk

      - name: Publish SDK
        if: startsWith(github.ref, 'refs/tags/sdk-v') || (github.event_name == 'workflow_dispatch' && inputs.package == 'sdk')
        working-directory: packages/sdk
        run: npm publish --provenance --access public

      - name: Build node
        if: startsWith(github.ref, 'refs/tags/node-v') || (github.event_name == 'workflow_dispatch' && inputs.package == 'node')
        run: npm run build --workspace=packages/node

      - name: Publish node
        if: startsWith(github.ref, 'refs/tags/node-v') || (github.event_name == 'workflow_dispatch' && inputs.package == 'node')
        working-directory: packages/node
        run: npm publish --provenance --access public
