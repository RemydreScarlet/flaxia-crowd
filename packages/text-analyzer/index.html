<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TextAnalyzer - 感情分析</title>
  <meta name="description" content="多言語感情分析ツール powered by Flaxia Crowd and DistilBERT">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <main class="main-content">
      <header class="top-bar">
        <span class="model-name">感情分析</span>
        <span class="model-badge">multilingual</span>
        <button id="consent-trigger" class="node-toggle-btn" title="Start Node Service">⟐</button>
      </header>

      <div class="analysis-container">
        <div class="input-section">
          <label class="input-label" for="analysis-input">テキストを入力して感情分析</label>
          <textarea id="analysis-input" placeholder="例: 今日はとてもいい天気だ！" rows="3"></textarea>
          <div class="input-actions">
            <button id="new-analysis-btn" class="new-analysis-btn" title="New Analysis">+</button>
            <button id="analyze-btn" class="analyze-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21L16.65 16.65"/></svg>
              感情分析を実行
            </button>
          </div>
        </div>

        <div id="results-section" class="results-section" style="display: none;">
          <div class="results-header">
            <h3>分析結果</h3>
            <span class="result-badge" id="result-badge">Positive</span>
          </div>
          <div class="score-bars" id="score-bars">
            <div class="score-row" data-label="Very Negative">
              <span class="score-label">Very Negative</span>
              <div class="score-track">
                <div class="score-fill very-negative"></div>
              </div>
              <span class="score-value">0%</span>
            </div>
            <div class="score-row" data-label="Negative">
              <span class="score-label">Negative</span>
              <div class="score-track">
                <div class="score-fill negative"></div>
              </div>
              <span class="score-value">0%</span>
            </div>
            <div class="score-row" data-label="Neutral">
              <span class="score-label">Neutral</span>
              <div class="score-track">
                <div class="score-fill neutral"></div>
              </div>
              <span class="score-value">0%</span>
            </div>
            <div class="score-row" data-label="Positive">
              <span class="score-label">Positive</span>
              <div class="score-track">
                <div class="score-fill positive"></div>
              </div>
              <span class="score-value">0%</span>
            </div>
            <div class="score-row" data-label="Very Positive">
              <span class="score-label">Very Positive</span>
              <div class="score-track">
                <div class="score-fill very-positive"></div>
              </div>
              <span class="score-value">0%</span>
            </div>
          </div>
          <div class="result-text" id="result-text"></div>
        </div>

        <div id="history-section" class="history-section">
          <div class="history-header">
            <h3>分析履歴</h3>
            <button id="clear-history-btn" class="clear-history-btn">Clear</button>
          </div>
          <div id="history-list" class="history-list">
            <div class="history-empty">まだ分析履歴がありません</div>
          </div>
        </div>
      </div>

      <div class="footer-bar">
        <span>Powered by Flaxia Crowd • DistilBERT multilingual</span>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
