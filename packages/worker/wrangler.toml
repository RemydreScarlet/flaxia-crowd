name = "flaxia-worker"
main = "src/index.ts"
compatibility_date = "2024-04-03"

[vars]
ENVIRONMENT = "development"

[[durable_objects.bindings]]
name = "TASK_QUEUE"
class_name = "TaskQueue"

[[durable_objects.bindings]]
name = "NODE_MANAGER"
class_name = "NodeManager"

[[durable_objects.bindings]]
name = "VECTOR_INDEX"
class_name = "VectorIndex"

[[migrations]]
tag = "v3"
new_sqlite_classes = ["TaskQueue", "NodeManager"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["VectorIndex"]
