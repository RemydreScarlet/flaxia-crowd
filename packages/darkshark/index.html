<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DarkShark - Decentralized AI Chat</title>
  <meta name="description" content="A decentralized AI chat client powered by Flaxia Crowd and Qwen 0.6B LLM running inside browser nodes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <main class="main-content">
      <header class="top-bar">
        <button id="new-chat-btn" class="new-chat-btn" title="New Chat">+</button>
        <span class="model-name">Qwen 0.6B</span>
        <span class="model-badge">decentralized</span>
        <button id="consent-trigger" class="node-toggle-btn" title="Start Node Service">⟐</button>
      </header>

      <div id="chat-messages" class="chat-messages">
        <div class="message system">
          <div class="message-content">
            Welcome to <strong>DarkShark</strong>. Ask Qwen 0.6B anything.
            Your request runs on the decentralized Flaxia Crowd network.
          </div>
        </div>
      </div>

      <div class="input-container">
        <form id="chat-input-form" class="chat-input-form">
          <textarea id="chat-input" placeholder="Message DarkShark..." rows="1"></textarea>
          <button type="submit" id="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          </button>
        </form>
        <p class="disclaimer">Powered by Flaxia Crowd • Qwen 0.6B</p>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
